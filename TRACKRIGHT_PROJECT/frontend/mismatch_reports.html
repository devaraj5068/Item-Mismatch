<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mismatch Reports - TrackRight</title>
    <link rel="stylesheet" href="assets/css/style.css">

</head>
<body>
    <div class="sidebar">
        <h2>TrackRight</h2>
        <ul>
            <li><a href="dashboard.html">Dashboard</a></li>
            <li><a href="orders.html">Orders</a></li>

            <li><a href="mismatch_reports.html">Mismatch Reports</a></li>

    <div class="main-content">
        <h1 data-aos="fade-up">Mismatch Reports</h1>
        <button id="filter-btn" data-aos="fade-up" data-aos-delay="200">Toggle Filters</button>
        <div id="filters" style="display: none;" data-aos="slide-down" data-aos-delay="300">
            <!-- Filters here -->
        </div>

            <thead>
                <tr>
                    <th>Order</th>
                    <th>Product</th>
                    <th>Expected</th>
                    <th>Actual</th>
                    <th>Reported At</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>

    <script>
        AOS.init();
    </script>
